services:
  gateway:
    build:
      context: gateway/docker
      dockerfile: development/nginx/Dockerfile
    ports:
      - "3000:3000"
      - "8081:8081"
      - "8082:8082"
    depends_on:
      - frontend-node
      - api
      - mailer

  frontend-node:
    build:
      context: frontend/docker/development/node
    volumes:
      - ./frontend:/app
    environment:
      - WDS_SOCKET_PORT=0
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8081
      - INTERNAL_BACKEND_URL=http://api
    command: sh -c "until [ -f .ready ] ; do sleep 1 ; done && yarn dev"
    tty: true

  frontend-node-cli:
    build:
      context: frontend/docker/development/node
    volumes:
      - ./frontend:/app


  api:
    build:
      context: api/docker
      dockerfile: development/nginx/Dockerfile
    volumes:
      - ./api:/app
    depends_on:
      - api-php-fpm

  api-php-fpm:
    build:
      context: api/docker
      dockerfile: development/php-fpm/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_DEBUG: 1
      PHP_IDE_CONFIG: serverName=API
      SITE_URL: localhost
      SITE_NAME: Docker
      DB_HOST: api-postgres
      DB_USER: app
      DB_PASSWORD: secret
      DB_NAME: app
      MAILER_HOST: mailer
      MAILER_PORT: 1025
      MAILER_USER: app
      MAILER_PASSWORD: secret
      MAILER_ENCRYPTION: tcp
      MAILER_FROM_EMAIL: admin@site.ru
      MAILER_FROM_NAME: admin
      FRONTEND_URL: http://localhost:3000
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
