# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    Nyholm\Psr7\Factory\Psr17Factory: ~

    # 2. Конвертер (Symfony Request -> PSR-7 ServerRequest)
    Symfony\Bridge\PsrHttpMessage\Factory\PsrHttpFactory:
        arguments:
            $serverRequestFactory: '@Nyholm\Psr7\Factory\Psr17Factory'
            $streamFactory: '@Nyholm\Psr7\Factory\Psr17Factory'
            $uploadedFileFactory: '@Nyholm\Psr7\Factory\Psr17Factory'
            $responseFactory: '@Nyholm\Psr7\Factory\Psr17Factory'

    Symfony\Bridge\PsrHttpMessage\HttpMessageFactoryInterface: '@Symfony\Bridge\PsrHttpMessage\Factory\PsrHttpFactory'

    # 3. Конвертер (PSR-7 Response -> Symfony Response)
    Symfony\Bridge\PsrHttpMessage\Factory\HttpFoundationFactory: ~

    Symfony\Bridge\PsrHttpMessage\HttpFoundationFactoryInterface: '@Symfony\Bridge\PsrHttpMessage\Factory\HttpFoundationFactory'

    # 4. Регистрируем перехватчики ядра (autoconfigure сам активирует их)
    Symfony\Bridge\PsrHttpMessage\ArgumentValueResolver\PsrServerRequestResolver: ~
    Symfony\Bridge\PsrHttpMessage\EventListener\PsrResponseListener: ~
    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Infrastructure/'
            - '../src/Http/'

    Infrastructure\:
        resource: '../src/Infrastructure/'

    Http\:
        resource: '../src/Http/'



    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
