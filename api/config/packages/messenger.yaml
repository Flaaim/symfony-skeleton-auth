framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
            failed: 'doctrine://default?queue_name=failed'


        routing:
            # Route your messages to the transports
            # 'App\Message\YourMessage': async
            'App\Auth\Event\PasswordResetRequested': async
            'App\Auth\Event\UserRemoved': async
            'App\Auth\Event\PasswordReset': async
            'App\Auth\Event\UserCreated': async
            'App\Auth\Event\JoinByEmailRequested': async
            'App\Auth\Event\UserRoleChanged': async
            'App\Auth\Event\UserJoinConfirmed': async
            'App\Auth\Event\NetworkAttached': async
            'App\Auth\Event\ChangeEmailRequested': async
            'Symfony\Component\Mailer\Messenger\SendEmailMessage': async

when@test:
    framework:
        messenger:
            transports:
            # replace with your transport name here (e.g., my_transport: 'in-memory://')
            # For more Messenger testing tools, see https://github.com/zenstruck/messenger-test
                async: 'in-memory://'
